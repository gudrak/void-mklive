name: Build Custom LXDE ISO

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # Usamos la imagen oficial de construcción de Void para que no falte ningún comando
    container:
      image: 'ghcr.io/void-linux/void-mklive:20250116R1'
      options: --privileged
      volumes:
        - /dev:/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies in container
        run: |
          xbps-install -Syu xbps
          xbps-install -yu
          # mklive ya viene instalado en esta imagen

      - name: Build the ISO
        run: |
          # Lista de paquetes exacta que pediste
          PACKAGES="base-system void-repo-nonfree \
          linux-firmware-network b43-fwcutter \
          xorg-server xorg-video-drivers xorg-input-drivers \
          lxdm lxde gvfs gvfs-mtp gvfs-smb \
          wicd \
          pavucontrol alsa-utils alsa-plugins-pulseaudio \
          desktop-file-utils htop dbus \
          xmirror vpm fuzzypkg micro git"

          # Ejecutamos mklive.sh (que ya está en el PATH del contenedor)
          # Habilitamos dbus, wicd y lxdm
          mklive.sh \
            -r https://repo-default.voidlinux.org/current \
            -r https://repo-default.voidlinux.org/current/nonfree \
            -p "$PACKAGES" \
            -S "dbus wicd lxdm" \
            -o void-lxde-custom.iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Void-LXDE-Custom-ISO
          path: void-lxde-custom.iso
